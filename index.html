<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>VibeZ – Private Chats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; background: #000; color: #fff; font-family: 'Sora', sans-serif; -webkit-font-smoothing: antialiased; }
    body { overflow: hidden; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    input, textarea, button, select { font-family: 'Sora', sans-serif; font-size: inherit; }
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #111 inset !important;
      -webkit-text-fill-color: #fff !important; caret-color: #fff;
    }
    .auth-page { min-height: 100vh; min-height: 100dvh; background: #000; display: flex; align-items: center; justify-content: center; padding: 24px 20px; background-image: radial-gradient(ellipse 90% 55% at 50% -8%, rgba(124,58,237,0.28) 0%, transparent 68%); }
    .auth-wrapper { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 40px; }
    .auth-logo-text { font-size: 58px; font-weight: 900; letter-spacing: -3px; background: linear-gradient(135deg, #7C3AED 25%, #A78BFA 80%, #C4B5FD 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; display: block; }
    .auth-logo-sub { color: #4B5563; font-size: 14px; margin-top: 10px; letter-spacing: 0.4px; }
    .auth-logo-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25); border-radius: 20px; padding: 4px 14px; font-size: 11px; color: #A78BFA; margin-top: 10px; letter-spacing: 0.5px; }
    .auth-card { background: #0A0A0A; border: 1px solid #1c1c1c; border-radius: 24px; padding: 32px 28px 28px; box-shadow: 0 0 100px rgba(124,58,237,0.12), 0 1px 0 rgba(255,255,255,0.04) inset; }
    .tab-switcher { display: flex; background: #111; border-radius: 14px; padding: 4px; margin-bottom: 26px; gap: 3px; }
    .tab-btn { flex: 1; padding: 11px 0; border: none; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.22s ease; letter-spacing: 0.2px; }
    .tab-btn.active { background: linear-gradient(135deg, #7C3AED, #6D28D9); color: #fff; box-shadow: 0 2px 14px rgba(124,58,237,0.45); }
    .tab-btn.inactive { background: transparent; color: #555; }
    .tab-btn.inactive:hover { color: #888; }
    .field-group { display: flex; flex-direction: column; gap: 14px; margin-bottom: 4px; }
    .field-label { display: block; color: #6B7280; font-size: 10.5px; font-weight: 700; letter-spacing: 1.1px; margin-bottom: 7px; text-transform: uppercase; }
    .field-input { width: 100%; padding: 13px 16px; border-radius: 12px; background: #111; border: 1.5px solid #222; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field-input:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .field-input::placeholder { color: #3a3a3a; }
    .auth-error { margin-top: 14px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; padding: 10px 14px; color: #F87171; font-size: 13px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .auth-submit-btn { width: 100%; margin-top: 20px; padding: 15px; border-radius: 14px; border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: all 0.22s ease; }
    .auth-submit-btn.ready { background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%); box-shadow: 0 4px 28px rgba(124,58,237,0.5); }
    .auth-submit-btn.ready:hover { transform: translateY(-1px); box-shadow: 0 6px 32px rgba(124,58,237,0.6); }
    .auth-submit-btn.loading { background: #1a1a1a; color: #555; cursor: not-allowed; box-shadow: none; }
    .auth-switch { text-align: center; margin-top: 18px; color: #444; font-size: 13px; }
    .auth-switch-link { color: #A78BFA; cursor: pointer; font-weight: 600; transition: color 0.15s; }
    .auth-switch-link:hover { color: #C4B5FD; }
    .strength-bar-wrap { display: flex; gap: 4px; margin-top: 8px; }
    .strength-seg { height: 3px; flex: 1; border-radius: 2px; transition: background 0.3s; }
    .screen { height: 100vh; height: 100dvh; display: flex; flex-direction: column; background: #000; overflow: hidden; }
    .list-header { background: #000; border-bottom: 1px solid #111; background-image: linear-gradient(180deg, rgba(124,58,237,0.1) 0%, transparent 100%); flex-shrink: 0; }
    .list-header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 18px 12px; }
    .vibez-wordmark { font-size: 26px; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, #7C3AED, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; user-select: none; }
    .search-wrap { padding: 0 15px 11px; position: relative; }
    .search-icon { position: absolute; left: 27px; top: 50%; transform: translateY(-55%); font-size: 14px; pointer-events: none; color: #444; }
    .search-input { width: 100%; padding: 10px 14px 10px 36px; border-radius: 20px; background: #111; border: 1px solid #1a1a1a; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: #7C3AED; }
    .search-input::placeholder { color: #333; }
    .nav-tabs { display: flex; border-top: 1px solid #111; }
    .nav-tab { flex: 1; padding: 10px 4px 11px; border: none; background: transparent; cursor: pointer; font-size: 12px; font-weight: 400; color: #444; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .nav-tab.active { color: #A78BFA; font-weight: 700; border-bottom-color: #7C3AED; }
    .user-row { display: flex; align-items: center; gap: 13px; padding: 12px 18px; border-bottom: 1px solid #080808; cursor: pointer; transition: background 0.15s; }
    .user-row:hover { background: #0a0a0a; }
    .user-row:active { background: #0d0d0d; }
    .user-row-info { flex: 1; min-width: 0; }
    .user-row-name { color: #fff; font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-row-sub { color: #444; font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .small-btn { border: none; color: #fff; padding: 7px 13px; border-radius: 9px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: opacity 0.15s, transform 0.1s; flex-shrink: 0; }
    .small-btn:active { transform: scale(0.96); }
    .empty-state { text-align: center; padding: 70px 20px; color: #333; }
    .empty-state .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state .text { font-size: 14px; }
    .footer-bar { padding: 11px 18px; border-top: 1px solid #111; display: flex; align-items: center; justify-content: space-between; background: #050505; flex-shrink: 0; }
    .chat-header { display: flex; align-items: center; gap: 11px; padding: 10px 14px; background: #050505; border-bottom: 1px solid #111; background-image: linear-gradient(180deg, rgba(124,58,237,0.07) 0%, transparent 100%); flex-shrink: 0; }
    .chat-back-btn { background: none; border: none; color: #7C3AED; font-size: 22px; cursor: pointer; padding: 3px 8px 3px 0; display: flex; align-items: center; line-height: 1; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 10px 13px; display: flex; flex-direction: column; }
    .date-separator { text-align: center; margin: 9px 0; }
    .date-separator span { color: #444; font-size: 11px; background: #0a0a0a; padding: 3px 11px; border-radius: 9px; }
    .msg-row { display: flex; align-items: flex-end; gap: 7px; margin-bottom: 5px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-sender-name { color: #A78BFA; font-size: 11px; margin-bottom: 3px; margin-left: 2px; }
    .msg-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.55; word-break: break-word; max-width: 74%; }
    .msg-bubble.mine { background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%); color: #fff; border-radius: 18px 18px 4px 18px; box-shadow: 0 2px 16px rgba(124,58,237,0.3); }
    .msg-bubble.theirs { background: #1F1F1F; color: #fff; border-radius: 18px 18px 18px 4px; }
    .msg-time { color: #2a2a2a; font-size: 10px; margin-top: 3px; }
    .msg-time.mine { text-align: right; }
    .msg-time.theirs { text-align: left; }
    .emoji-picker { background: #0a0a0a; border-top: 1px solid #1a1a1a; padding: 10px 13px; display: flex; flex-wrap: wrap; gap: 5px; max-height: 155px; overflow-y: auto; flex-shrink: 0; }
    .emoji-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 3px 4px; border-radius: 6px; transition: background 0.1s; line-height: 1; }
    .emoji-btn:hover { background: #1a1a1a; }
    .chat-input-bar { display: flex; align-items: flex-end; gap: 8px; padding: 9px 13px 11px; background: #050505; border-top: 1px solid #111; flex-shrink: 0; }
    .icon-circle-btn { border: 1px solid #1a1a1a; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: 18px; }
    .chat-textarea { flex: 1; background: #111; border: 1.5px solid #1a1a1a; border-radius: 22px; padding: 10px 15px; color: #fff; font-size: 14px; resize: none; outline: none; line-height: 1.5; max-height: 108px; overflow-y: auto; transition: border-color 0.2s; }
    .chat-textarea:focus { border-color: #7C3AED; }
    .chat-textarea::placeholder { color: #333; }
    .send-btn { border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; border: none; }
    .send-btn.active { background: linear-gradient(135deg, #7C3AED, #6D28D9); box-shadow: 0 2px 16px rgba(124,58,237,0.5); }
    .send-btn.inactive { background: #111; border: 1px solid #1a1a1a; cursor: not-allowed; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 0 16px; }
    .modal-card { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 22px; padding: 28px 24px; width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 80px rgba(124,58,237,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .close-btn { background: #1a1a1a; border: 1px solid #222; color: #aaa; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .close-btn:hover { background: #222; }
    .priv-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #111; }
    .toggle-track { width: 44px; height: 24px; border-radius: 12px; cursor: pointer; position: relative; transition: background 0.25s; flex-shrink: 0; }
    .toggle-thumb { position: absolute; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left 0.25s; }
    .vanish-modal { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 22px; padding: 30px 22px; max-width: 310px; width: 100%; text-align: center; }
    .notif-badge { background: #EF4444; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0; }
    .section-label { padding: 13px 18px 5px; color: #6B7280; font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading-pulse { animation: pulse 1.2s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Database ── */
    if (!window.__vz) {
      window.__vz = { users: [], messages: [], requests: [], online: {}, privacy: {} };
    }
    const DB = window.__vz;

    /* ── Helpers ── */
    const uid  = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const now  = () => Date.now();
    const cid  = (a, b) => [a, b].sort().join('::');
    const fmtTime = (t) => new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const fmtDate = (t) => {
      const d = new Date(t), today = new Date();
      if (d.toDateString() === today.toDateString()) return 'Today';
      const y = new Date(); y.setDate(y.getDate() - 1);
      if (d.toDateString() === y.toDateString()) return 'Yesterday';
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    };
    const accentColor = (name = '?') => {
      const cols = ['#7C3AED','#6D28D9','#5B21B6','#8B5CF6','#A78BFA','#9333EA'];
      let h = 0; for (const c of name) h = c.charCodeAt(0) + ((h << 5) - h);
      return cols[Math.abs(h) % cols.length];
    };
    const initials = (name = '?') => name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const passwordStrength = (p) => {
      if (!p) return 0; let s = 0;
      if (p.length >= 6) s++; if (p.length >= 10) s++;
      if (/[A-Z]/.test(p)) s++; if (/[0-9]/.test(p)) s++;
      if (/[^A-Za-z0-9]/.test(p)) s++; return Math.min(s, 4);
    };
    const STRENGTH_LABELS = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const STRENGTH_COLORS = ['#333', '#EF4444', '#F59E0B', '#3B82F6', '#22C55E'];
    const EMOJIS = ['😀','😂','😍','🥰','😎','🤔','😢','😡','👍','👎','❤️','🔥','✨','🎉','💯','🙏','👀','💪','😭','🤣','😊','😏','🥺','😴','🤗','💀','👋','🎊','🌟','💫','⚡','🎯','🌈','💎','🚀','🍕','🎮','🏆','💰','🌸'];

    /* ── Auth Service ── */
    const Auth = {
      signup(name, email, pass) {
        const e = email.trim().toLowerCase();
        if (!name.trim()) return { err: 'Name is required.' };
        if (!e) return { err: 'Email is required.' };
        if (pass.length < 6) return { err: 'Password must be at least 6 characters.' };
        if (DB.users.find(u => u.email === e)) return { err: 'This email is already registered.' };
        const user = { id: uid(), name: name.trim(), email: e, pass, photo: null, bio: '', createdAt: now() };
        DB.users.push(user);
        DB.online[user.id] = now();
        DB.privacy[user.id] = { online: true, photo: true, bio: true, seen: true };
        return { user };
      },
      login(email, pass) {
        const e = email.trim().toLowerCase();
        if (!e) return { err: 'Enter your email.' };
        if (!pass) return { err: 'Enter your password.' };
        const user = DB.users.find(u => u.email === e && u.pass === pass);
        if (!user) return { err: 'Wrong email or password.' };
        DB.online[user.id] = now(); return { user };
      },
      ping(id) { DB.online[id] = now(); },
      isOnline(id) { const l = DB.online[id]; return !!l && now() - l < 30000; },
      lastSeen(id) {
        const l = DB.online[id]; if (!l) return 'never';
        const d = now() - l;
        if (d < 60000) return 'just now';
        if (d < 3600000) return Math.floor(d/60000) + 'm ago';
        if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
        return fmtDate(l);
      },
      priv(id) { return DB.privacy[id] || { online:true, photo:true, bio:true, seen:true }; },
      setPriv(id, p) { DB.privacy[id] = { ...DB.privacy[id], ...p }; },
      updateProfile(id, fields) {
        const i = DB.users.findIndex(u => u.id === id);
        if (i !== -1) { DB.users[i] = { ...DB.users[i], ...fields }; return DB.users[i]; }
        return null;
      },
    };

    /* ── Messages Service ── */
    const Msg = {
      send(from, to, text) {
        const m = { id: uid(), text, from, to, cid: cid(from, to), at: now(), gone: false };
        DB.messages.push(m); return m;
      },
      get(a, b) {
        const id = cid(a, b);
        return DB.messages.filter(m => m.cid === id && !m.gone).sort((x, y) => x.at - y.at).slice(-50);
      },
      vanish(a, b) { const id = cid(a, b); DB.messages.forEach(m => { if (m.cid === id) m.gone = true; }); },
      last(a, b) {
        const id = cid(a, b);
        return DB.messages.filter(m => m.cid === id && !m.gone).sort((x, y) => y.at - x.at)[0] || null;
      },
    };

    /* ── Friends Service ── */
    const Fr = {
      send(from, to) {
        if (DB.requests.find(r => (r.from===from&&r.to===to)||(r.from===to&&r.to===from))) return;
        DB.requests.push({ id: uid(), from, to, st: 'pending', at: now() });
      },
      accept(rid) { const r = DB.requests.find(r => r.id === rid); if (r) r.st = 'accepted'; },
      reject(rid) { const r = DB.requests.find(r => r.id === rid); if (r) r.st = 'rejected'; },
      rel(a, b) { return DB.requests.find(r => (r.from===a&&r.to===b)||(r.from===b&&r.to===a)) || null; },
      incoming(id) { return DB.requests.filter(r => r.to === id && r.st === 'pending'); },
      sent(id) { return DB.requests.filter(r => r.from === id && r.st === 'pending'); },
    };

    /* ── Avatar ── */
    function Avatar({ user, size = 40, showOnline = false }) {
      const p = Auth.priv(user?.id);
      const isOn = showOnline && p.online && Auth.isOnline(user?.id);
      return (
        <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
          {user?.photo && p.photo ? (
            <img src={user.photo} alt="" style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', border:'2.5px solid #7C3AED' }} />
          ) : (
            <div style={{ width:size, height:size, borderRadius:'50%', background:`linear-gradient(135deg,${accentColor(user?.name)},${accentColor((user?.name||'')+'1')})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.35, fontWeight:700, color:'#fff', border:'2.5px solid #7C3AED' }}>
              {initials(user?.name)}
            </div>
          )}
          {showOnline && (
            <div style={{ position:'absolute', bottom:1, right:1, width:size*0.28, height:size*0.28, borderRadius:'50%', background:isOn?'#22C55E':'#374151', border:'2px solid #000', transition:'background 0.3s' }} />
          )}
        </div>
      );
    }

    /* ── Profile Modal ── */
    function ProfileModal({ user, onClose, onSave }) {
      const [name, setName] = useState(user.name);
      const [bio, setBio] = useState(user.bio || '');
      const [photo, setPhoto] = useState(user.photo || null);
      const [priv, setPriv] = useState(Auth.priv(user.id));
      const fileRef = useRef();
      const save = () => {
        const updated = Auth.updateProfile(user.id, { name: name.trim() || user.name, bio, photo });
        Auth.setPriv(user.id, priv);
        onSave(updated || { ...user, name, bio, photo }); onClose();
      };
      const privOpts = [['online','Show online status'],['seen','Show last seen'],['photo','Show profile photo'],['bio','Show bio to others']];
      return (
        <div className="modal-overlay">
          <div className="modal-card fade-in">
            <div className="modal-header">
              <span style={{ color:'#fff', fontWeight:700, fontSize:17 }}>Edit Profile</span>
              <button className="close-btn" onClick={onClose}>✕</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:22 }}>
              <div style={{ position:'relative', cursor:'pointer' }} onClick={() => fileRef.current.click()}>
                {photo ? (
                  <img src={photo} alt="" style={{ width:84, height:84, borderRadius:'50%', objectFit:'cover', border:'3px solid #7C3AED' }} />
                ) : (
                  <div style={{ width:84, height:84, borderRadius:'50%', background:`linear-gradient(135deg,${accentColor(name)},#4C1D95)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, fontWeight:700, color:'#fff', border:'3px solid #7C3AED' }}>
                    {initials(name)}
                  </div>
                )}
                <div style={{ position:'absolute', bottom:2, right:2, background:'#7C3AED', borderRadius:'50%', width:26, height:26, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, border:'2px solid #000' }}>📷</div>
              </div>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:'none' }}
                onChange={e => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>setPhoto(ev.target.result); r.readAsDataURL(f); }} />
              <span style={{ color:'#555', fontSize:12, marginTop:6 }}>Tap to change photo</span>
            </div>
            <div style={{ marginBottom:13 }}>
              <label className="field-label">Display Name</label>
              <input value={name} onChange={e => setName(e.target.value)} className="field-input" placeholder="Your name" />
            </div>
            <div style={{ marginBottom:20 }}>
              <label className="field-label">Bio</label>
              <textarea value={bio} onChange={e => setBio(e.target.value)} rows={3} placeholder="Something about you..." style={{ width:'100%', padding:'11px 14px', borderRadius:12, background:'#111', border:'1.5px solid #222', color:'#fff', fontSize:14, outline:'none', resize:'none', lineHeight:1.5, boxSizing:'border-box' }} />
            </div>
            <div style={{ marginBottom:24 }}>
              <label className="field-label">Privacy Settings</label>
              {privOpts.map(([k, l]) => (
                <div key={k} className="priv-row">
                  <span style={{ color:'#ccc', fontSize:13 }}>{l}</span>
                  <div className="toggle-track" style={{ background:priv[k]?'#7C3AED':'#2a2a2a' }} onClick={() => setPriv(p => ({ ...p, [k]:!p[k] }))}>
                    <div className="toggle-thumb" style={{ left:priv[k]?22:3 }} />
                  </div>
                </div>
              ))}
            </div>
            <button onClick={save} style={{ width:'100%', padding:'13px', borderRadius:12, border:'none', background:'linear-gradient(135deg,#7C3AED,#6D28D9)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer', boxShadow:'0 4px 20px rgba(124,58,237,0.35)' }}>
              Save Changes
            </button>
          </div>
        </div>
      );
    }

    /* ── Auth Screen ── */
    function AuthScreen({ onLogin }) {
      const [mode, setMode] = useState('login');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const [showPass, setShowPass] = useState(false);
      const [err, setErr] = useState('');
      const [busy, setBusy] = useState(false);
      const strength = passwordStrength(pass);
      const switchMode = (m) => { setMode(m); setErr(''); setName(''); setEmail(''); setPass(''); setShowPass(false); };
      const submit = () => {
        setErr(''); setBusy(true);
        setTimeout(() => {
          const res = mode === 'signup' ? Auth.signup(name, email, pass) : Auth.login(email, pass);
          setBusy(false);
          if (res.err) { setErr(res.err); return; }
          onLogin(res.user);
        }, 300);
      };
      const onKey = (e) => { if (e.key === 'Enter') submit(); };
      return (
        <div className="auth-page">
          <div className="auth-wrapper fade-in">
            <div className="auth-logo">
              <span className="auth-logo-text">VibeZ</span>
              <div className="auth-logo-sub">Private chats. Your vibe.</div>
              <div className="auth-logo-badge">🔒 End-to-end private</div>
            </div>
            <div className="auth-card">
              <div className="tab-switcher">
                {[['login','Sign In'],['signup','Sign Up']].map(([id, l]) => (
                  <button key={id} onClick={() => switchMode(id)} className={`tab-btn ${mode===id?'active':'inactive'}`}>{l}</button>
                ))}
              </div>
              <div className="field-group">
                {mode === 'signup' && (
                  <div>
                    <label className="field-label">Full Name</label>
                    <input type="text" value={name} onChange={e => setName(e.target.value)} onKeyDown={onKey} placeholder="Your full name" autoComplete="name" className="field-input" />
                  </div>
                )}
                <div>
                  <label className="field-label">Email Address</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={onKey} placeholder="you@example.com" autoComplete="email" className="field-input" />
                </div>
                <div>
                  <label className="field-label">Password</label>
                  <div style={{ position:'relative' }}>
                    <input type={showPass?'text':'password'} value={pass} onChange={e => setPass(e.target.value)} onKeyDown={onKey} placeholder={mode==='signup'?'Min 6 characters':'••••••••'} autoComplete={mode==='signup'?'new-password':'current-password'} className="field-input" style={{ paddingRight:46 }} />
                    <button onClick={() => setShowPass(s => !s)} style={{ position:'absolute', right:14, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#555', cursor:'pointer', fontSize:16, lineHeight:1 }}>
                      {showPass ? '🙈' : '👁️'}
                    </button>
                  </div>
                  {mode === 'signup' && pass && (
                    <div style={{ marginTop:8 }}>
                      <div className="strength-bar-wrap">
                        {[1,2,3,4].map(i => <div key={i} className="strength-seg" style={{ background:i<=strength?STRENGTH_COLORS[strength]:'#222' }} />)}
                      </div>
                      <div style={{ color:STRENGTH_COLORS[strength], fontSize:11, marginTop:4 }}>{STRENGTH_LABELS[strength]}</div>
                    </div>
                  )}
                </div>
              </div>
              {err && <div className="auth-error"><span>⚠️</span> {err}</div>}
              <button onClick={submit} disabled={busy} className={`auth-submit-btn ${busy?'loading':'ready'}`}>
                {busy ? <span className="loading-pulse">{mode==='login'?'Signing in…':'Creating account…'}</span> : (mode==='login'?'Sign In →':'Create Account →')}
              </button>
              <div className="auth-switch">
                {mode==='login'?'New here? ':'Already have an account? '}
                <span className="auth-switch-link" onClick={() => switchMode(mode==='login'?'signup':'login')}>
                  {mode==='login'?'Sign Up':'Sign In'}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Users List Screen ── */
    function UsersListScreen({ me: initMe, onChat, onLogout }) {
      const [me, setMe] = useState(initMe);
      const [tab, setTab] = useState('people');
      const [search, setSearch] = useState('');
      const [showProf, setShowProf] = useState(false);
      const [tick, setTick] = useState(0);
      const rerender = () => setTick(t => t + 1);
      useEffect(() => {
        Auth.ping(me.id);
        const iv = setInterval(() => { Auth.ping(me.id); rerender(); }, 4000);
        return () => clearInterval(iv);
      }, [me.id]);
      const q = search.toLowerCase();
      const others = DB.users.filter(u => u.id !== me.id && (u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
      const friends = DB.users.filter(u => u.id !== me.id && Fr.rel(me.id, u.id)?.st === 'accepted');
      const inc = Fr.incoming(me.id);
      const snt = Fr.sent(me.id);
      const FrBtn = ({ user }) => {
        const r = Fr.rel(me.id, user.id);
        if (!r) return <button className="small-btn" style={{ background:'#7C3AED' }} onClick={() => { Fr.send(me.id, user.id); rerender(); }}>Add Friend</button>;
        if (r.st==='pending' && r.from===me.id) return <span style={{ color:'#6B7280', fontSize:12 }}>Sent ✓</span>;
        if (r.st==='pending' && r.to===me.id) return (
          <div style={{ display:'flex', gap:5 }}>
            <button className="small-btn" style={{ background:'#22C55E' }} onClick={() => { Fr.accept(r.id); rerender(); }}>✓</button>
            <button className="small-btn" style={{ background:'#EF4444' }} onClick={() => { Fr.reject(r.id); rerender(); }}>✕</button>
          </div>
        );
        if (r.st==='accepted') return <button className="small-btn" style={{ background:'#7C3AED' }} onClick={() => onChat(user)}>Chat</button>;
        return null;
      };
      const Row = ({ user, onClick, right }) => {
        const p = Auth.priv(user.id);
        const on = p.online && Auth.isOnline(user.id);
        const last = Msg.last(me.id, user.id);
        return (
          <div className="user-row" onClick={onClick}>
            <Avatar user={user} size={50} showOnline />
            <div className="user-row-info">
              <div style={{ display:'flex', justifyContent:'space-between' }}>
                <div className="user-row-name">{user.name}</div>
                {last && <span style={{ color:'#333', fontSize:11, flexShrink:0 }}>{fmtTime(last.at)}</span>}
              </div>
              <div className="user-row-sub">
                {last ? (last.from===me.id?`You: ${last.text}`:last.text) : on ? '🟢 Online' : p.seen ? `Last seen ${Auth.lastSeen(user.id)}` : user.email}
              </div>
            </div>
            {right && <div onClick={e => e.stopPropagation()}>{right}</div>}
          </div>
        );
      };
      const tabs = [['people','People'],['friends',`Friends${friends.length?` (${friends.length})`:''}`],['requests',`Requests${inc.length?` · ${inc.length}`:''}`]];
      return (
        <div className="screen">
          <div className="list-header">
            <div className="list-header-top">
              <div className="vibez-wordmark">VibeZ</div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                {inc.length > 0 && <div className="notif-badge">{inc.length}</div>}
                <div style={{ cursor:'pointer' }} onClick={() => setShowProf(true)}><Avatar user={me} size={37} showOnline /></div>
              </div>
            </div>
            <div className="search-wrap">
              <span className="search-icon">🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search people..." className="search-input" />
            </div>
            <div className="nav-tabs">
              {tabs.map(([id, l]) => <button key={id} onClick={() => setTab(id)} className={`nav-tab ${tab===id?'active':''}`}>{l}</button>)}
            </div>
          </div>
          <div style={{ flex:1, overflowY:'auto' }}>
            {tab === 'people' && (others.length === 0 ? <Empty icon="👥" text={search?'No users found.':'No other users yet!'} /> : others.map(u => <Row key={u.id} user={u} onClick={Fr.rel(me.id,u.id)?.st==='accepted'?()=>onChat(u):undefined} right={<FrBtn user={u} />} />))}
            {tab === 'friends' && (friends.length === 0 ? <Empty icon="🤝" text="No friends yet. Send some requests!" /> : friends.map(u => <Row key={u.id} user={u} onClick={() => onChat(u)} right={<button className="small-btn" style={{ background:'#7C3AED' }} onClick={() => onChat(u)}>Chat</button>} />))}
            {tab === 'requests' && (
              <>
                {inc.length > 0 && (<><div className="section-label">Incoming Requests</div>{inc.map(r => { const f=DB.users.find(u=>u.id===r.from); return f && (<div key={r.id} className="user-row" style={{ cursor:'default' }}><Avatar user={f} size={46} /><div className="user-row-info"><div className="user-row-name">{f.name}</div><div className="user-row-sub">{f.email}</div></div><div style={{ display:'flex', gap:7, flexShrink:0 }}><button className="small-btn" style={{ background:'#22C55E' }} onClick={() => { Fr.accept(r.id); rerender(); }}>Accept</button><button className="small-btn" style={{ background:'#111', border:'1px solid #333', color:'#EF4444' }} onClick={() => { Fr.reject(r.id); rerender(); }}>Decline</button></div></div>); })}</>)}
                {snt.length > 0 && (<><div className="section-label">Sent Requests</div>{snt.map(r => { const t=DB.users.find(u=>u.id===r.to); return t && (<div key={r.id} className="user-row" style={{ cursor:'default' }}><Avatar user={t} size={46} /><div className="user-row-info"><div className="user-row-name">{t.name}</div><div className="user-row-sub" style={{ color:'#7C3AED' }}>Pending…</div></div></div>); })}</>)}
                {inc.length===0 && snt.length===0 && <Empty icon="📨" text="No pending requests." />}
              </>
            )}
          </div>
          <div className="footer-bar">
            <div>
              <div style={{ color:'#fff', fontSize:14, fontWeight:600 }}>{me.name}</div>
              <div style={{ color:'#22C55E', fontSize:11, marginTop:1 }}>● Online</div>
            </div>
            <button onClick={onLogout} style={{ background:'#111', border:'1px solid #1f1f1f', color:'#6B7280', padding:'7px 15px', borderRadius:9, cursor:'pointer', fontSize:13 }}>Sign Out</button>
          </div>
          {showProf && <ProfileModal user={me} onClose={() => setShowProf(false)} onSave={u => setMe(u)} />}
        </div>
      );
    }

    /* ── Chat Screen ── */
    function ChatScreen({ me, other: initOther, onBack }) {
      const [msgs, setMsgs] = useState([]);
      const [text, setText] = useState('');
      const [showEmoji, setShowEmoji] = useState(false);
      const [showVanish, setShowVanish] = useState(false);
      const [other, setOther] = useState(initOther);
      const inputRef = useRef();
      const bottomRef = useRef();
      const load = useCallback(() => {
        const fresh = DB.users.find(u => u.id === other.id);
        if (fresh) setOther(fresh);
        setMsgs(Msg.get(me.id, other.id));
      }, [me.id, other.id]);
      useEffect(() => {
        load(); Auth.ping(me.id);
        const iv = setInterval(() => { load(); Auth.ping(me.id); }, 3000);
        return () => clearInterval(iv);
      }, [load, me.id]);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);
      const send = () => {
        const t = text.trim(); if (!t) return;
        Msg.send(me.id, other.id, t); setText(''); setShowEmoji(false);
        inputRef.current?.blur(); load();
      };
      const priv = Auth.priv(other.id);
      const on = priv.online && Auth.isOnline(other.id);
      const grouped = []; let lastD = null;
      msgs.forEach(m => {
        const d = fmtDate(m.at);
        if (d !== lastD) { grouped.push({ d:true, l:d, k:'d'+d }); lastD = d; }
        grouped.push({ m, k:m.id });
      });
      const freshMe = DB.users.find(u => u.id === me.id) || me;
      return (
        <div className="screen">
          <div className="chat-header">
            <button className="chat-back-btn" onClick={onBack}>←</button>
            <Avatar user={other} size={42} showOnline />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color:'#fff', fontWeight:700, fontSize:15, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{other.name}</div>
              <div style={{ fontSize:11, color:on?'#22C55E':'#555', marginTop:1 }}>{on?'● Online now':priv.seen?`Last seen ${Auth.lastSeen(other.id)}`:''}</div>
            </div>
            <button onClick={() => setShowVanish(true)} className="icon-circle-btn" style={{ background:'#111', fontSize:17 }}>👻</button>
          </div>
          <div className="chat-messages">
            {msgs.length === 0 && (
              <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#2a2a2a' }}>
                <div style={{ fontSize:52, marginBottom:12 }}>💬</div>
                <div style={{ fontSize:15, fontWeight:600, color:'#333' }}>Start chatting</div>
                <div style={{ fontSize:13, marginTop:5 }}>Say hi to {other.name}!</div>
              </div>
            )}
            {grouped.map(item => {
              if (item.d) return <div key={item.k} className="date-separator"><span>{item.l}</span></div>;
              const { m } = item; const mine = m.from === me.id; const u = mine ? freshMe : other;
              return (
                <div key={item.k} className={`msg-row ${mine?'mine':''}`}>
                  {!mine && <Avatar user={u} size={28} />}
                  <div style={{ maxWidth:'74%' }}>
                    {!mine && <div className="msg-sender-name">{u.name}</div>}
                    <div className={`msg-bubble ${mine?'mine':'theirs'}`}>{m.text}</div>
                    <div className={`msg-time ${mine?'mine':'theirs'}`}>{fmtTime(m.at)}</div>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>
          {showEmoji && (
            <div className="emoji-picker">
              {EMOJIS.map(e => <button key={e} className="emoji-btn" onClick={() => { setText(t => t+e); inputRef.current?.focus(); }}>{e}</button>)}
            </div>
          )}
          <div className="chat-input-bar">
            <button className="icon-circle-btn" style={{ background:showEmoji?'#7C3AED':'#111' }} onClick={() => setShowEmoji(e => !e)}>😊</button>
            <textarea ref={inputRef} value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }} placeholder="Message…" rows={1} className="chat-textarea"
              onInput={e => { e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,108)+'px'; }} />
            <button onClick={send} disabled={!text.trim()} className={`send-btn ${text.trim()?'active':'inactive'}`}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
          {showVanish && (
            <div className="modal-overlay">
              <div className="vanish-modal fade-in">
                <div style={{ fontSize:48, marginBottom:12 }}>👻</div>
                <div style={{ color:'#fff', fontWeight:700, fontSize:17, marginBottom:8 }}>Vanish this chat?</div>
                <div style={{ color:'#555', fontSize:13, marginBottom:26, lineHeight:1.6 }}>
                  All messages with <span style={{ color:'#A78BFA' }}>{other.name}</span> will be permanently deleted for both of you.
                </div>
                <div style={{ display:'flex', gap:9 }}>
                  <button onClick={() => setShowVanish(false)} style={{ flex:1, padding:12, borderRadius:11, border:'1px solid #2a2a2a', background:'transparent', color:'#aaa', cursor:'pointer' }}>Cancel</button>
                  <button onClick={() => { Msg.vanish(me.id,other.id); setShowVanish(false); load(); }} style={{ flex:1, padding:12, borderRadius:11, border:'none', background:'#EF4444', color:'#fff', cursor:'pointer', fontWeight:700 }}>Vanish 🔥</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Empty({ icon, text }) {
      return <div className="empty-state"><div className="icon">{icon}</div><div className="text">{text}</div></div>;
    }

    /* ── Root App ── */
    function App() {
      const [user, setUser] = useState(null);
      const [chat, setChat] = useState(null);
      if (!user) return <AuthScreen onLogin={u => { setUser(u); setChat(null); }} />;
      if (chat) return <ChatScreen me={user} other={chat} onBack={() => setChat(null)} />;
      return <UsersListScreen me={user} onChat={setChat} onLogout={() => { setUser(null); setChat(null); }} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
